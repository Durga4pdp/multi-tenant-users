name: Deploy-user1

on:
  push:
    branches: [main]
    paths:
      - 'apps/nodejs/**'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push image to ACR
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag (short SHA + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/tenant-nodejs
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./apps/nodejs
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes (user1 namespace)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig from GitHub Secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Deploy new image to user1 namespace
        id: deploy
        run: |
          kubectl set image deployment/webapp \
            webapp=${{ secrets.ACR_LOGIN_SERVER }}/tenant-nodejs:${{ needs.build.outputs.image_tag }} \
            -n user1
          kubectl rollout status deployment/webapp -n user1 --timeout=120s

      # ── Runs only if deploy step above fails ──
      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "⚠️  Deployment failed — rolling back to previous version"
          kubectl rollout undo deployment/webapp -n user1
          kubectl rollout status deployment/webapp -n user1 --timeout=60s
          echo "✅ Rollback complete"

      # ── Runs only if deploy succeeds ──
      - name: Publish Kafka deployment event
        if: success()
        run: |
          EVENT="{\"event\":\"WebsiteDeployed\",\"user\":\"user1\",\"image\":\"${{ needs.build.outputs.image_tag }}\",\"status\":\"success\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          echo "$EVENT" | docker run --rm -i confluentinc/cp-kafka:7.5.0 \
            kafka-console-producer \
            --bootstrap-server ${{ secrets.KAFKA_BROKER }} \
            --topic deployment-events
          echo "✅ Kafka event published: $EVENT"

      - name: Print deployment summary
        if: always()
        run: |
          echo "==============================="
          echo "  DEPLOYMENT SUMMARY"
          echo "==============================="
          echo "  User:      user1"
          echo "  Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "  Registry:  ${{ secrets.ACR_LOGIN_SERVER }}"
          echo "==============================="
          kubectl get pods -n user1

