  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: webapp
    namespace: user2
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: webapp
    template:
      metadata:
        labels:
          app: webapp
      spec:
        imagePullSecrets:
        - name: acr-secret
        containers:
        - name: webapp
          image: containerrepotest.azurecr.io/tenant-flask:latest
          ports:
          - containerPort: 5000
          env:
          - name: USER_NAME
            value: "user2"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
  
