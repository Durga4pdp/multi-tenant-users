  apiVersion: networking.k8s.io/v1
  kind: NetworkPolicy
  metadata:
    name: deny-cross-namespace
    namespace: user2
  spec:
    podSelector: {}
    policyTypes:
    - Ingress
    ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: user2
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
